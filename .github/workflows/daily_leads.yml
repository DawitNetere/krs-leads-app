name: Daily KRS Leads

on:
  schedule:
    # 9 PM Warsaw time. Poland is UTC+2 in summer (CEST) and UTC+1 in winter (CET).
    # 19:00 UTC = 21:00 CEST (summer) | 20:00 CET (winter)
    # Adjust the hour here if you want exact 9 PM year-round.
    - cron: '0 19 * * *'
  workflow_dispatch:  # also allows manual runs from the GitHub UI
    inputs:
      date:
        description: 'Scrape date (YYYY-MM-DD). Leave blank for today.'
        required: false

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run daily leads job
        env:
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          INSTANTLY_CAMPAIGN_ID: ${{ secrets.INSTANTLY_CAMPAIGN_ID }}
          REGON_API_KEY: ${{ secrets.REGON_API_KEY }}
          SCRAPE_DATE: ${{ github.event.inputs.date }}
        run: python daily_job.py
